<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - نظام المحاسبة المتكامل</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tahoma', 'Arial', sans-serif; background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .login-container { background: rgba(255,255,255,0.95); padding: 40px; border-radius: 30px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.3); }
        h1 { color: #1e3a5f; margin-bottom: 10px; }
        .input-group { margin-bottom: 20px; text-align: right; }
        label { display: block; margin-bottom: 8px; font-weight: bold; }
        input { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 12px; font-size: 16px; }
        button { width: 100%; padding: 12px; background: #1e3a5f; color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .error { color: red; margin-top: 15px; display: none; }
        .info { margin-top: 25px; font-size: 12px; color: #666; }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>📊 نظام المحاسبة المتكامل</h1>
        <form id="loginForm">
            <div class="input-group">
                <label>📧 البريد الإلكتروني</label>
                <input type="email" id="email" required>
            </div>
            <div class="input-group">
                <label>🔒 كلمة المرور</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit">دخول</button>
        </form>
        <div id="errorMsg" class="error"></div>
        <div class="info">
            <p>📌 تجريبي: admin@example.com / admin123</p>
            <p>📌 auditor@example.com / auditor123</p>
            <p>📌 employee@example.com / emp123</p>
            <p>📌 tailor@example.com / tailor123</p>
        </div>
    </div>
    <script type="module">
        import { signIn } from './supabase.js';
        const form = document.getElementById('loginForm');
        const errorDiv = document.getElementById('errorMsg');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            try {
                const { user, role } = await signIn(email, password);
                localStorage.setItem('userId', user.id);
                localStorage.setItem('userRole', role);
                if (role === 'admin') window.location.href = 'admin.html';
                else if (role === 'auditor') window.location.href = 'auditor.html';
                else window.location.href = 'dashboard.html';
            } catch (err) {
                errorDiv.textContent = 'فشل تسجيل الدخول: تأكد من البريد وكلمة المرور';
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
