<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - نظام المحاسبة</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tahoma', Arial, sans-serif; background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .login-container { background: rgba(255,255,255,0.95); padding: 40px; border-radius: 30px; width: 90%; max-width: 400px; text-align: center; }
        h1 { color: #1e3a5f; margin-bottom: 20px; }
        input { width: 100%; padding: 14px; margin: 10px 0; border: 2px solid #ddd; border-radius: 12px; font-size: 16px; }
        button { width: 100%; padding: 14px; background: #1e3a5f; color: white; border: none; border-radius: 12px; font-size: 18px; cursor: pointer; }
        .error { color: red; margin-top: 15px; display: none; }
        .info { margin-top: 20px; font-size: 12px; color: #666; }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>📊 نظام المحاسبة المتكامل</h1>
        <form id="loginForm">
            <input type="email" id="email" placeholder="البريد الإلكتروني" required>
            <input type="password" id="password" placeholder="كلمة المرور" required>
            <button type="submit">دخول</button>
        </form>
        <div id="errorMsg" class="error"></div>
        <div class="info">
            <p>admin@nextgen.com / admin123 (مدير)</p>
            <p>auditor@nextgen.com / auditor123 (مراجع)</p>
            <p>employee@nextgen.com / emp123 (موظف)</p>
            <p>tailor@nextgen.com / tailor123 (خياط)</p>
        </div>
    </div>
    <script type="module">
        import { signIn } from './supabase.js';
        const form = document.getElementById('loginForm');
        const errorDiv = document.getElementById('errorMsg');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorDiv.style.display = 'none';
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            try {
                const profile = await signIn(email, password);
                if (profile.role === 'admin') window.location.href = 'admin.html';
                else if (profile.role === 'auditor') window.location.href = 'auditor.html';
                else window.location.href = 'dashboard.html';
            } catch (err) {
                errorDiv.textContent = err.message || 'فشل تسجيل الدخول';
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
