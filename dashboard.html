<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة المستخدم</title>
    <style>/* نفس الأنماط */</style>
</head>
<body>
    <div class="header"><h2>📋 لوحة المستخدم</h2><button onclick="logout()">خروج</button></div>
    <div class="container">
        <div id="tailorSection" style="display:none;">
            <h3>➕ إضافة إنتاج جديد</h3>
            <input type="text" id="productName" placeholder="اسم المنتج">
            <input type="number" id="quantity" placeholder="الكمية">
            <input type="number" id="price" placeholder="السعر">
            <button onclick="addProduction()">إضافة</button>
        </div>
        <h3>معاملاتي المالية</h3>
        <table id="myTransactions"><thead><tr><th>الوصف</th><th>المبلغ</th><th>الحالة</th><th>اعتراض</th></tr></thead><tbody></tbody></table>
        <h3>إنتاجاتي</h3>
        <table id="myProductions"><thead><tr><th>المنتج</th><th>الكمية</th><th>الحالة</th><th>اعتراض</th></tr></thead><tbody></tbody></table>
    </div>
    <script type="module">
        import { supabase, getCurrentUser, addProduction, addObjection } from './supabase.js';
        let currentUser;
        async function init() {
            currentUser = await getCurrentUser();
            if (!currentUser) window.location.href = 'index.html';
            if (currentUser.role === 'tailor') document.getElementById('tailorSection').style.display = 'block';
            await loadMyTransactions();
            await loadMyProductions();
        }
        async function loadMyTransactions() {
            const { data } = await supabase.from('transactions').select('*').eq('member_id', currentUser.id);
            const tbody = document.querySelector('#myTransactions tbody');
            tbody.innerHTML = data.map(t => `
                <tr>
                    <td>${t.description}</td><td>${t.amount}</td><td>${t.status}</td>
                    <td><button onclick="object('transaction','${t.id}')">اعتراض</button></td>
                </tr>
            `).join('');
        }
        async function loadMyProductions() {
            const { data } = await supabase.from('productions').select('*').eq('member_id', currentUser.id);
            const tbody = document.querySelector('#myProductions tbody');
            tbody.innerHTML = data.map(p => `
                <tr>
                    <td>${p.product_name}</td><td>${p.quantity}</td><td>${p.status}</td>
                    <td><button onclick="object('production','${p.id}')">اعتراض</button></td>
                </tr>
            `).join('');
        }
        window.object = async (type, id) => {
            const reason = prompt('سبب الاعتراض:');
            if (reason) {
                await addObjection({
                    member_id: currentUser.id,
                    transaction_id: type === 'transaction' ? id : null,
                    production_id: type === 'production' ? id : null,
                    reason
                }, currentUser.id);
                alert('تم إرسال الاعتراض');
            }
        };
        window.addProduction = async () => {
            const product_name = document.getElementById('productName').value;
            const quantity = parseInt(document.getElementById('quantity').value);
            const price = parseFloat(document.getElementById('price').value);
            if (!product_name || !quantity) return alert('املأ الحقول');
            await addProduction({ member_id: currentUser.id, product_name, model: '', quantity, price }, currentUser.id);
            alert('تمت الإضافة');
            await loadMyProductions();
        };
        async function logout() { await supabase.auth.signOut(); window.location.href = 'index.html'; }
        window.logout = logout;
        init();
    </script>
</body>
</html>
