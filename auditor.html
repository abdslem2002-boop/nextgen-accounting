<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة المراجع</title>
    <style>/* نفس ستايل admin.html تقريباً */</style>
</head>
<body>
    <div class="header"><h2>🔍 لوحة المراجع</h2><button onclick="logout()">خروج</button></div>
    <div class="container">
        <h3>معاملات بانتظار المراجعة</h3>
        <table id="transactionsTable"><thead><tr><th>الوصف</th><th>المبلغ</th><th>العضو</th><th>إجراء</th></tr></thead><tbody></tbody></table>
        <h3>إنتاج بانتظار المراجعة</h3>
        <table id="productionsTable"><thead><tr><th>المنتج</th><th>الكمية</th><th>الخياط</th><th>إجراء</th></tr></thead><tbody></tbody></table>
    </div>
    <script type="module">
        import { supabase, getCurrentUser, reviewTransaction, reviewProduction } from './supabase.js';
        let currentUser;
        async function init() {
            currentUser = await getCurrentUser();
            if (!currentUser || currentUser.role !== 'auditor') window.location.href = 'index.html';
            await loadPendingTransactions();
            await loadPendingProductions();
        }
        async function loadPendingTransactions() {
            const { data } = await supabase.from('transactions').select('*, profiles(name)').eq('status', 'pending');
            const tbody = document.querySelector('#transactionsTable tbody');
            tbody.innerHTML = data.map(t => `
                <tr>
                    <td>${t.description}</td><td>${t.amount}</td><td>${t.profiles?.name}</td>
                    <td><button class="btn-sm btn-success" onclick="review('${t.id}', 'approve')">موافقة</button>
                    <button class="btn-sm btn-danger" onclick="review('${t.id}', 'reject')">رفض</button></td>
                </tr>
            `).join('');
        }
        window.review = async (id, action) => {
            const reason = action === 'reject' ? prompt('سبب الرفض:') : null;
            await reviewTransaction(id, currentUser.id, action, reason);
            await loadPendingTransactions();
        };
        async function loadPendingProductions() {
            const { data } = await supabase.from('productions').select('*, profiles(name)').eq('status', 'pending');
            const tbody = document.querySelector('#productionsTable tbody');
            tbody.innerHTML = data.map(p => `
                <tr>
                    <td>${p.product_name}</td><td>${p.quantity}</td><td>${p.profiles?.name}</td>
                    <td><button class="btn-sm btn-success" onclick="reviewProd('${p.id}')">موافقة</button></td>
                </tr>
            `).join('');
        }
        window.reviewProd = async (id) => {
            await reviewProduction(id, currentUser.id);
            await loadPendingProductions();
        };
        async function logout() { await supabase.auth.signOut(); window.location.href = 'index.html'; }
        window.logout = logout;
        init();
    </script>
</body>
</html>
