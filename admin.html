<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة المدير</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tahoma', sans-serif; background: #f0f2f5; }
        .header { background: #1e3a5f; color: white; padding: 15px 30px; display: flex; justify-content: space-between; }
        .container { max-width: 1400px; margin: 20px auto; padding: 0 20px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn { padding: 10px 20px; background: white; border: none; border-radius: 30px; cursor: pointer; }
        .tab-btn.active { background: #1e3a5f; color: white; }
        .tab-content { display: none; background: white; padding: 20px; border-radius: 20px; }
        .tab-content.active { display: block; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; border-bottom: 1px solid #ddd; text-align: right; }
        .btn-sm { padding: 5px 10px; border: none; border-radius: 20px; cursor: pointer; }
        .btn-success { background: #28a745; color: white; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-warning { background: #ffc107; }
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 12px; }
        .badge-pending { background: #ffc107; }
        .badge-auditor_reviewed { background: #17a2b8; color: white; }
        .badge-approved { background: #28a745; color: white; }
    </style>
</head>
<body>
    <div class="header">
        <h2>👑 لوحة المدير</h2>
        <button onclick="logout()" style="background:#dc3545; color:white; border:none; padding:8px 20px; border-radius:30px;">خروج</button>
    </div>
    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('transactions')">المعاملات</button>
            <button class="tab-btn" onclick="switchTab('productions')">الإنتاج</button>
            <button class="tab-btn" onclick="switchTab('objections')">الاعتراضات</button>
            <button class="tab-btn" onclick="switchTab('members')">الأعضاء</button>
        </div>
        <div id="transactionsTab" class="tab-content active">
            <h3>المعاملات المالية</h3>
            <div class="table-wrapper">
                <table id="transactionsTable">
                    <thead><tr><th>الوصف</th><th>المبلغ</th><th>العضو</th><th>الحالة</th><th>إجراء</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
        <div id="productionsTab" class="tab-content">
            <h3>إنتاج الخياطين</h3>
            <table id="productionsTable"><thead><tr><th>المنتج</th><th>الكمية</th><th>الخياط</th><th>الحالة</th><th>إجراء</th></tr></thead><tbody></tbody></table>
        </div>
        <div id="objectionsTab" class="tab-content">
            <h3>الاعتراضات</h3>
            <table id="objectionsTable"><thead><tr><th>السبب</th><th>الحالة</th><th>إجراء</th></tr></thead><tbody></tbody></table>
        </div>
        <div id="membersTab" class="tab-content">
            <h3>إدارة الأعضاء</h3>
            <table id="membersTable"><thead><tr><th>الاسم</th><th>الدور</th><th>حذف</th></tr></thead><tbody></tbody></table>
        </div>
    </div>
    <script type="module">
        import { supabase, getCurrentUser, approveTransaction, approveProduction, resolveObjection, getAllProfiles, addAuditLog } from './supabase.js';
        let currentUser = null;
        async function init() {
            currentUser = await getCurrentUser();
            if (!currentUser || currentUser.role !== 'admin') {
                window.location.href = 'index.html';
                return;
            }
            await loadTransactions();
            await loadProductions();
            await loadObjections();
            await loadMembers();
        }
        async function loadTransactions() {
            const { data } = await supabase.from('transactions').select('*, profiles(name)').order('date', { ascending: false });
            const tbody = document.querySelector('#transactionsTable tbody');
            tbody.innerHTML = data.map(t => `
                <tr>
                    <td>${t.description}</td>
                    <td>${t.amount} ريال</td>
                    <td>${t.profiles?.name || t.member_id}</td>
                    <td><span class="badge badge-${t.status}">${t.status}</span></td>
                    <td>${t.status === 'auditor_reviewed' ? `<button class="btn-sm btn-success" onclick="approveTrans('${t.id}')">اعتماد</button>` : ''}</td>
                </tr>
            `).join('');
        }
        window.approveTrans = async (id) => {
            await approveTransaction(id, currentUser.id);
            await loadTransactions();
        };
        async function loadProductions() {
            const { data } = await supabase.from('productions').select('*, profiles(name)');
            const tbody = document.querySelector('#productionsTable tbody');
            tbody.innerHTML = data.map(p => `
                <tr>
                    <td>${p.product_name}</td>
                    <td>${p.quantity}</td>
                    <td>${p.profiles?.name || p.member_id}</td>
                    <td><span class="badge badge-${p.status}">${p.status}</span></td>
                    <td>${p.status === 'auditor_reviewed' ? `<button class="btn-sm btn-success" onclick="approveProd('${p.id}')">اعتماد</button>` : ''}</td>
                </tr>
            `).join('');
        }
        window.approveProd = async (id) => {
            await approveProduction(id, currentUser.id);
            await loadProductions();
        };
        async function loadObjections() {
            const { data } = await supabase.from('objections').select('*');
            const tbody = document.querySelector('#objectionsTable tbody');
            tbody.innerHTML = data.map(o => `
                <tr>
                    <td>${o.reason}</td>
                    <td>${o.status}</td>
                    <td>${o.status === 'pending' ? `<button class="btn-sm btn-warning" onclick="resolveObj('${o.id}')">رد</button>` : ''}</td>
                </tr>
            `).join('');
        }
        window.resolveObj = async (id) => {
            const response = prompt('الرد على الاعتراض:');
            if (response) await resolveObjection(id, currentUser.id, response);
            await loadObjections();
        };
        async function loadMembers() {
            const members = await getAllProfiles();
            const tbody = document.querySelector('#membersTable tbody');
            tbody.innerHTML = members.map(m => `
                <tr>
                    <td>${m.name}</td>
                    <td>${m.role}</td>
                    <td>${m.role !== 'admin' ? `<button class="btn-sm btn-danger" onclick="deleteMember('${m.id}')">حذف</button>` : '-'}</td>
                </tr>
            `).join('');
        }
        window.deleteMember = async (id) => {
            if (confirm('حذف العضو نهائياً؟')) {
                await supabase.rpc('delete_user', { user_id: id });
                await loadMembers();
            }
        };
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(`${tab}Tab`).classList.add('active');
        }
        window.switchTab = switchTab;
        async function logout() { await supabase.auth.signOut(); localStorage.clear(); window.location.href = 'index.html'; }
        window.logout = logout;
        init();
    </script>
</body>
</html>
